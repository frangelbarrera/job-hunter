name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Lint with ruff
        run: ruff check scrapers/ scripts/ tests/

      - name: Format check with ruff
        run: ruff format --check scrapers/ scripts/ tests/

      - name: Run tests with coverage
        run: pytest --cov=scrapers --cov=scripts --cov-report=term-missing

      - name: Upload coverage to GitHub Actions summary
        if: matrix.python-version == '3.11'
        run: |
          echo "## Test coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pytest --cov=scrapers --cov=scripts --cov-report=term --tb=no -q >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
